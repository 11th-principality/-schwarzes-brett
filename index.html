<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第14帝國 セリフアーカイブ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a08;
    --surface: #1a1410;
    --gold: #c8a96e;
    --gold-light: #e8c98e;
    --gold-dim: #6b5a3e;
    --text: #e8ddd0;
    --text-dim: #8a7a68;
    --red: #8b2020;
    --border: #3a2e22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Shippori Mincho', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* 背景テクスチャ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(200,169,110,0.015) 2px,
        rgba(200,169,110,0.015) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    text-align: center;
    padding: 3rem 1rem 2rem;
    position: relative;
    z-index: 1;
  }

  .header-deco {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .header-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .header-line.right {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .header-emblem {
    font-size: 1.2rem;
    color: var(--gold);
    letter-spacing: 0.3em;
  }

  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 900;
    color: var(--gold-light);
    letter-spacing: 0.15em;
    text-shadow: 0 0 40px rgba(200,169,110,0.3);
    margin-bottom: 0.3rem;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }

  /* フィルター */
  .filter-bar {
    width: 100%;
    max-width: 700px;
    padding: 0 1.5rem;
    margin-bottom: 2rem;
    position: relative;
    z-index: 1;
  }

  .filter-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    margin-bottom: 0.6rem;
  }

  .filter-scroll {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    padding-bottom: 0.5rem;
    scrollbar-width: none;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Shippori Mincho', serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
    border-radius: 2px;
  }

  .filter-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold-light);
  }

  .filter-btn.active {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(200,169,110,0.08);
  }

  /* メインカード */
  .stage {
    width: 100%;
    max-width: 700px;
    padding: 0 1.5rem;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3rem 2.5rem 2.5rem;
    position: relative;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold);
    border-style: solid;
  }
  .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .card-inner {
    position: relative;
  }

  .card-inner::before, .card-inner::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold);
    border-style: solid;
  }
  .card-inner::before { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .card-inner::after  { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

  .serifu-text {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.05rem, 3vw, 1.35rem);
    font-weight: 400;
    line-height: 2;
    color: var(--text);
    letter-spacing: 0.05em;
    margin-bottom: 2rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .serifu-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .serifu-meta {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s;
  }

  .serifu-meta.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .meta-chara {
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    font-weight: 700;
  }

  .meta-source {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
  }

  .quote-mark {
    position: absolute;
    top: -3rem;
    left: -1rem;
    font-size: 8rem;
    color: rgba(200,169,110,0.04);
    font-family: serif;
    z-index: 0;
    pointer-events: none;
    user-select: none;
  }

  .serifu-text,
  .serifu-meta {
    position: relative;
    z-index: 1;
  }

  /* ボタン */
  .btn-area {
    display: flex;
    gap: 1rem;
    justify-content: center;
    position: relative;
    z-index: 1;
    margin-bottom: 3rem;
    flex-wrap: wrap;
    padding: 0 1.5rem;
  }

  .btn-main {
    padding: 0.9rem 2.5rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
  }

  .btn-main::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-101%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: -1;
  }

  .btn-main:hover::before { transform: translateX(0); }
  .btn-main:hover { color: var(--bg); }

  .btn-main:active { transform: scale(0.98); }

  /* カウンター */
  .counter {
    text-align: center;
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    margin-bottom: 4rem;
    position: relative;
    z-index: 1;
  }

  /* フッター装飾 */
  footer {
    margin-top: auto;
    padding: 1.5rem;
    text-align: center;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    position: relative;
    z-index: 1;
    opacity: 0.5;
  }

  /* 検索バー */
  .search-bar {
    width: 100%;
    max-width: 700px;
    padding: 0 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    gap: 0.7rem;
    position: relative;
    z-index: 1;
  }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.8rem 1rem;
    font-family: 'Shippori Mincho', serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.25s;
  }

  .search-input:focus {
    border-color: var(--gold);
  }

  .search-input::placeholder {
    color: var(--text-dim);
  }

  .search-btn {
    padding: 0 1.4rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.25s;
  }

  .search-btn:hover {
    background: var(--gold);
    color: var
