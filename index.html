<style>
  :root {
    --bg: #0d0a08;
    --surface: #1a1410;
    --gold: #c8a96e;
    --gold-light: #e8c98e;
    --gold-dim: #6b5a3e;
    --text: #e8ddd0;
    --text-dim: #8a7a68;
    --red: #8b2020;
    --border: #3a2e22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Shippori Mincho', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* 背景テクスチャ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(200,169,110,0.015) 2px,
        rgba(200,169,110,0.015) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    text-align: center;
    padding: 3rem 1rem 2rem;
    position: relative;
    z-index: 1;
  }

  .header-deco {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .header-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .header-line.right {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .header-emblem {
    font-size: 1.2rem;
    color: var(--gold);
    letter-spacing: 0.3em;
  }

  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 900;
    color: var(--gold-light);
    letter-spacing: 0.15em;
    text-shadow: 0 0 40px rgba(200,169,110,0.3);
    margin-bottom: 0.3rem;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }

  /* 検索 */
  .search-bar {
    width: 100%;
    max-width: 700px;
    padding: 0 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    z-index: 1;
  }

  .search-wrap {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.6rem 2.5rem 0.6rem 1rem;
    color: var(--text);
    font-family: 'Shippori Mincho', serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    outline: none;
    transition: border-color 0.25s;
  }

  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--gold-dim); }

  .search-clear {
    position: absolute;
    right: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    display: none;
    padding: 0;
  }
  .search-clear.visible { display: block; }

  /* フィルター */
  .filter-bar {
    width: 100%;
    max-width: 700px;
    padding: 0 1.5rem;
    margin-bottom: 1rem;
    position: relative;
    z-index: 1;
  }

  .filter-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    margin-bottom: 0.6rem;
  }

  .filter-scroll {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    padding-bottom: 0.5rem;
    scrollbar-width: none;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Shippori Mincho', serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
    border-radius: 2px;
  }

  .filter-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold-light);
  }

  .filter-btn.active {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(200,169,110,0.08);
  }

  /* メインカード */
  .stage {
    width: 100%;
    max-width: 700px;
    padding: 0 1.5rem;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3rem 2.5rem 2.5rem;
    position: relative;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold);
    border-style: solid;
  }
  .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .card-inner::before, .card-inner::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold);
    border-style: solid;
  }
  .card-inner::before { top: -1.2rem; right: -1.2rem; border-width: 2px 2px 0 0; }
  .card-inner::after  { bottom: -1.2rem; left: -1.2rem; border-width: 0 0 2px 2px; }

  .card-inner {
    position: relative;
  }

  .serifu-text {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.05rem, 3vw, 1.35rem);
    font-weight: 400;
    line-height: 2;
    color: var(--text);
    letter-spacing: 0.05em;
    margin-bottom: 2rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .serifu-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .serifu-meta {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s;
  }

  .serifu-meta.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .meta-chara {
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    font-weight: 700;
  }

  .meta-source {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
  }

  .quote-mark {
    position: absolute;
    top: -1.5rem;
    left: -0.5rem;
    font-size: 5rem;
    color: rgba(200,169,110,0.08);
    font-family: serif;
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  /* ボタン */
  .btn-area {
    display: flex;
    gap: 1rem;
    justify-content: center;
    position: relative;
    z-index: 1;
    margin-bottom: 3rem;
    flex-wrap: wrap;
    padding: 0 1.5rem;
  }

  .btn-main {
    padding: 0.9rem 2.5rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
  }

  .btn-main::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-101%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: -1;
  }

  .btn-main:hover::before { transform: translateX(0); }
  .btn-main:hover { color: var(--bg); }

  .btn-main:active { transform: scale(0.98); }

  /* コピーボタン */
  .btn-copy {
    padding: 0.9rem 2rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s, border-color 0.3s;
  }
  .btn-copy:hover {
    border-color: var(--gold-dim);
    color: var(--gold-light);
  }
  .btn-copy.copied {
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* カウンター */
  .counter {
    text-align: center;
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    margin-bottom: 4rem;
    position: relative;
    z-index: 1;
  }

  /* フッター装飾 */
  footer {
    margin-top: auto;
    padding: 1.5rem;
    text-align: center;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    position: relative;
    z-index: 1;
    opacity: 0.5;
  }
</style>
</head>

// パース
function parseData(raw) {
  const blocks = raw.trim().split(/\n\n+/);
  const result = [];
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    const metaLine = lines.find(l => l.startsWith('（'));
    const textLines = lines.filter(l => !l.startsWith('（'));
    if (!metaLine || textLines.length === 0) continue;
    const text = textLines.join('\n').trim();
    // （キャラ-出典）をパース
    const inner = metaLine.replace(/^（/, '').replace(/）$/, '').trim();
    const dashIdx = inner.indexOf('-');
    let chara = inner, source = '';
    if (dashIdx !== -1) {
      chara = inner.slice(0, dashIdx).trim();
      source = inner.slice(dashIdx + 1).trim();
    }
    const volMatch = source.match(/[Vv]ol\.?\s*[\d０-９]+|オールナイト[\d０-９１２３４５６７８９]+|Expo[^\-]*/);
    const vol = volMatch ? volMatch[0].trim().replace(/^[Vv]ol/, 'vol') : '';
    result.push({ text, chara, source, vol });
  }
  return result;
}

let allSerifu = parseData(rawData);
let filtered = [...allSerifu];
let current = null;
let currentChara = 'all';
let currentVol = 'all';
let searchQuery = '';

// 検索
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  applyFilter();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  applyFilter();
});

function applyFilter() {
  filtered = allSerifu.filter(s => {
    const charaMatch = currentChara === 'all' || s.chara === currentChara;
    const volMatch = currentVol === 'all' || s.vol === currentVol;
    const q = searchQuery.toLowerCase();
    const textMatch = !q ||
      s.text.toLowerCase().includes(q) ||
      s.chara.toLowerCase().includes(q) ||
      s.source.toLowerCase().includes(q);
    return charaMatch && volMatch && textMatch;
  });
  current = null; // フィルター変更時はリセット
  updateCounter();
  showRandom();
}

// vol一覧生成
function buildVolFilters() {
  const scroll = document.getElementById('volScroll');
  const vols = [...new Set(allSerifu.map(s => s.vol).filter(Boolean))].sort((a, b) => {
    const na = parseInt(a.replace(/[^0-9]/g, '')) || 0;
    const nb = parseInt(b.replace(/[^0-9]/g, '')) || 0;
    return na - nb;
  });
  vols.forEach(vol => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.vol = vol;
    btn.textContent = vol;
    btn.onclick = () => setVolFilter(vol);
    scroll.appendChild(btn);
  });
}

function setVolFilter(vol) {
  currentVol = vol;
  document.querySelectorAll('#volScroll .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.vol === vol);
  });
  applyFilter();
}

// コピー
function copySerifu() {
  if (!current) return;
  const text = `${current.text}\n（${current.chara}-${current.source}）`;
  const btn = document.getElementById('btnCopy');

  // clipboard API を試みて、ダメなら textarea fallback
  const doFallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  };

  try {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).catch(doFallback);
    } else {
      doFallback();
    }
  } catch(e) {
    doFallback();
  }

  btn.textContent = 'コピー済 ✓';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = 'コピー';
    btn.classList.remove('copied');
  }, 2000);
}

// キャラ一覧生成
function buildFilters() {
  const scroll = document.getElementById('filterScroll');
  const charas = [...new Set(allSerifu.map(s => s.chara))].sort();
  charas.forEach(chara => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.chara = chara;
    btn.textContent = chara;
    btn.onclick = () => setFilter(chara);
    scroll.appendChild(btn);
  });
}

function setFilter(chara) {
  currentChara = chara;
  document.querySelectorAll('#filterScroll .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.chara === chara);
  });
  applyFilter();
}

function updateCounter() {
  document.getElementById('counter').textContent = `${filtered.length} 件のセリフ`;
}

function showRandom() {
  const textEl = document.getElementById('serifuText');
  const metaEl = document.getElementById('serifuMeta');

  textEl.classList.remove('visible');
  metaEl.classList.remove('visible');

  setTimeout(() => {
    if (filtered.length === 0) {
      textEl.textContent = '該当するセリフがありません';
      document.getElementById('metaChara').textContent = '';
      document.getElementById('metaSource').textContent = '';
      textEl.classList.add('visible');
      return;
    }

    const candidates = filtered.length > 1 && current
      ? filtered.filter(s => s !== current)
      : filtered;
    current = candidates[Math.floor(Math.random() * candidates.length)];

    textEl.textContent = current.text;
    document.getElementById('metaChara').textContent = current.chara;
    document.getElementById('metaSource').textContent = current.source;

    requestAnimationFrame(() => {
      textEl.classList.add('visible');
      metaEl.classList.add('visible');
    });
  }, 250);
}

// 初期化
buildFilters();
buildVolFilters();
updateCounter();
showRandom();
</script>
